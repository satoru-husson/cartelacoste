<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carte ESG - Fournisseurs Lacoste</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; background: #f4f4f9; }
        #header { background: #2c3e50; color: white; padding: 10px; text-align: center; }
        #map { height: calc(100vh - 50px); width: 100vw; }
        
        .popup-title { font-size: 15px; font-weight: bold; border-bottom: 1px solid #ccc; padding-bottom: 5px; margin-bottom: 5px; }
        .popup-location { font-style: italic; color: #555; font-size: 12px; margin-bottom: 8px; }
        
        .tag-env { display: inline-block; background: #27ae60; color: white; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; margin-bottom: 5px;}
        .tag-soc { display: inline-block; background: #c0392b; color: white; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; margin-bottom: 5px;}
        .tag-mix { display: inline-block; background: #e67e22; color: white; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; margin-bottom: 5px;}
        
        .desc { font-size: 13px; line-height: 1.4; }
    </style>
</head>
<body>

    <div id="header">
        <strong>Cartographie des Incidents RSE & Environnementaux (Supply Chain Réelle)</strong>
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        var map = L.map('map').setView([20.0, 10.0], 2);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // DONNÉES RÉELLES ISSUES DE LA LISTE LACOSTE FOURNIE
        var usines = [
            // --- IMPACTS ENVIRONNEMENTAUX ---
            {
                nom: "Arvind Limited", lieu: "Ahmedabad, Inde", lat: 23.0225, lng: 72.5714, type: "mix",
                tag: "ENVIRONNEMENT & SOCIAL",
                desc: "<strong>Pollution fluviale & Grèves :</strong> En 2021/2022, les autorités (GPCB) ont coupé les égouts de l'usine pour rejet d'effluents industriels toxiques rendant le fleuve Sabarmati biologiquement 'mort'. L'usine fait aussi face à des grèves massives pour les salaires."
            },
            {
                nom: "Nishat Mills Limited", lieu: "Lahore, Pakistan", lat: 31.5204, lng: 74.3587, type: "env",
                tag: "ENVIRONNEMENT",
                desc: "<strong>Épuisement hydrique :</strong> Les rapports environnementaux ont pointé une surconsommation critique d'eau douce (jusqu'à 100 litres d'eau pour 1 kg de tissu), forçant l'entreprise à installer des systèmes de filtration d'urgence."
            },
            {
                nom: "Gul Ahmed Textile Mills", lieu: "Karachi, Pakistan", lat: 24.8600, lng: 67.0000, type: "env",
                tag: "ENVIRONNEMENT",
                desc: "<strong>Stress hydrique massif :</strong> L'usine pompe entre 1 et 1,5 million de gallons d'eau par jour pour ses processus de teinture, aggravant la crise de l'eau dans la région de Karachi."
            },
            {
                nom: "Sapphire Textile Mills", lieu: "Sheikhupura, Pakistan", lat: 31.7100, lng: 73.9800, type: "env",
                tag: "ENVIRONNEMENT",
                desc: "<strong>Rejets chimiques :</strong> Historique de rejets de déchets dangereux ayant forcé l'entreprise à adhérer en urgence au programme ZDHC (Zero Discharge of Hazardous Chemicals) pour stopper la pollution des sols."
            },
            {
                nom: "Tong Hong Tannery", lieu: "Phu My, Vietnam", lat: 10.5800, lng: 107.0300, type: "env",
                tag: "ENVIRONNEMENT",
                desc: "<strong>Pollution au Chrome (Tannerie) :</strong> Le groupe Tong Hong, l'un des plus grands tanneurs de la liste, utilise des processus au chrome (métal lourd) extrêmement toxiques pour les écosystèmes fluviaux locaux en cas de fuite."
            },
            {
                nom: "Sadesa SA", lieu: "Lomas de Zamora, Argentine", lat: -34.7600, lng: -58.4000, type: "env",
                tag: "ENVIRONNEMENT",
                desc: "<strong>Désastre écologique :</strong> Cette tannerie opère dans le bassin Matanza-Riachuelo, classé parmi les fleuves les plus pollués au monde, où les tanneries sont visées par des injonctions de la Cour Suprême pour pollution chimique."
            },
            {
                nom: "PT. Kahatex", lieu: "Bandung, Indonésie", lat: -6.9100, lng: 107.6000, type: "env",
                tag: "ENVIRONNEMENT",
                desc: "<strong>Pollution du fleuve Citarum :</strong> Ce géant du textile est l'un des contributeurs industriels de la région de Bandung, où les rejets de colorants toxiques ont rendu le fleuve Citarum tristement célèbre au niveau mondial."
            },
            {
                nom: "Formosa Chemicals & Fiber", lieu: "Chiayi, Taïwan", lat: 23.4800, lng: 120.4400, type: "env",
                tag: "ENVIRONNEMENT",
                desc: "<strong>Émissions toxiques :</strong> Fait partie du groupe Formosa, l'un des conglomérats les plus lourdement sanctionnés par l'EPA taïwanaise pour ses émissions atmosphériques et rejets toxiques."
            },
            {
                nom: "Bossa T.A.S", lieu: "Adana, Turquie", lat: 37.0000, lng: 35.3200, type: "env",
                tag: "ENVIRONNEMENT",
                desc: "<strong>Pollution Denim :</strong> En tant que producteur majeur de denim, ses processus de délavage et de teinture indigo ont un impact lourd sur les rejets de microplastiques et la qualité de l'eau locale."
            },
            {
                nom: "Textil del Valle", lieu: "Chincha, Pérou", lat: -13.4100, lng: -76.1300, type: "env",
                tag: "ENVIRONNEMENT",
                desc: "<strong>Pompage des nappes phréatiques :</strong> La culture et le traitement intensif du coton dans cette usine aggravent le stress hydrique très sévère de la région d'Ica/Chincha, privant les communautés d'eau potable."
            },
            {
                nom: "Chyang Sheng Dyeing", lieu: "Taoyuan, Taïwan", lat: 25.0400, lng: 121.1900, type: "env",
                tag: "ENVIRONNEMENT",
                desc: "<strong>Eaux usées industrielles :</strong> Le secteur de la teinture à Taoyuan est sous surveillance stricte après de multiples scandales de rejets d'eaux colorées non traitées détruisant la faune des rivières locales."
            },
            {
                nom: "PT. Kurabo Manunggal", lieu: "Tangerang, Indonésie", lat: -6.1700, lng: 106.6300, type: "env",
                tag: "ENVIRONNEMENT",
                desc: "<strong>Dégradation locale :</strong> Les installations textiles de la zone industrielle de Tangerang font régulièrement l'objet de plaintes des riverains pour la pollution de l'air et le déversement de boues toxiques."
            },
            {
                nom: "Cotonificio Albini S.p.A.", lieu: "Albino, Italie", lat: 45.7600, lng: 9.7900, type: "env",
                tag: "ENVIRONNEMENT",
                desc: "<strong>Déchets textiles massifs :</strong> Des études environnementales (2024) ont pris cette usine en exemple pour illustrer le volume colossal de déchets textiles générés nécessitant des traitements de recyclage lourds."
            },

            // --- IMPACTS SOCIAUX & GOUVERNANCE ---
            {
                nom: "Lenzing AG", lieu: "Lenzing, Autriche", lat: 47.9542, lng: 13.6214, type: "mix",
                tag: "ENVIRONNEMENT & SOCIAL",
                desc: "<strong>Substances toxiques & Licenciements :</strong> Utilisation de tonnes de substances toxiques pour la reproduction (H361fd) et fortes émissions de sulfure d'hydrogène. Socialement : licenciement de 600 personnes."
            },
            {
                nom: "TOPY TOP S.A.", lieu: "Lima, Pérou", lat: -12.0464, lng: -77.0428, type: "soc",
                tag: "SOCIAL",
                desc: "<strong>Répression syndicale :</strong> Enquête de la Fair Labor Association confirmant la discrimination anti-syndicale (SINTOTTSA), des licenciements abusifs et l'usage illégal de contrats précaires courts."
            },
            {
                nom: "PT. PAN BROTHERS Tbk", lieu: "Boyolali, Indonésie", lat: -7.5333, lng: 110.5900, type: "soc",
                tag: "SOCIAL",
                desc: "<strong>Conflit salarial :</strong> Mouvements de grève d'ampleur avec les travailleurs dénonçant des salaires impayés et la modification unilatérale des conditions de paiement de leurs primes."
            },
            {
                nom: "Tropic Knits Ltd", lieu: "Vacoas, Île Maurice", lat: -20.2986, lng: 57.4783, type: "soc",
                tag: "SOCIAL",
                desc: "<strong>Conditions de travail abusives :</strong> Historique de grèves majeures contre l'imposition de quarts de travail de 12 heures augmentant les risques d'accidents, et litiges devant le tribunal du travail."
            },
            {
                nom: "Brandix Essentials", lieu: "Koggala, Sri Lanka", lat: 5.9933, lng: 80.3259, type: "soc",
                tag: "SOCIAL",
                desc: "<strong>Lock-out punitif :</strong> En décembre 2022, la direction a verrouillé les portes de l'usine à 1 500 travailleurs qui faisaient grève pour protester contre la réduction de 50% de leur prime annuelle."
            },
            {
                nom: "Alok Industries Limited", lieu: "Silvassa, Inde", lat: 20.2700, lng: 73.0100, type: "soc",
                tag: "SOCIAL",
                desc: "<strong>Violations du droit du travail :</strong> Les travailleurs ont organisé des grèves pour dénoncer des journées de 12 heures exténuantes, l'absence de paiement des heures supplémentaires et des retards de salaires chroniques."
            },
            {
                nom: "AQUARELLE MADAGASCAR", lieu: "Antsirabe, Madagascar", lat: -19.8659, lng: 47.0333, type: "soc",
                tag: "SOCIAL",
                desc: "<strong>Pauvreté systémique :</strong> Bien que conforme au salaire minimum légal malgache, les enquêtes ONG montrent que ce salaire ne couvre même pas les besoins nutritionnels de base (Living Wage) des ouvriers."
            }
        ];

        // CONFIGURATION DES COULEURS DES MARQUEURS
        var icons = {
            env: new L.Icon({ iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-green.png', shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png', iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41] }),
            soc: new L.Icon({ iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png', shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png', iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41] }),
            mix: new L.Icon({ iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-orange.png', shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png', iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41] })
        };

        // AJOUT DES POINTS SUR LA CARTE
        usines.forEach(function(u) {
            var cssClass = u.type === 'env' ? 'tag-env' : (u.type === 'soc' ? 'tag-soc' : 'tag-mix');
            
            var popupContent = `
                <div class="popup-title">${u.nom}</div>
                <div class="popup-location">📍 ${u.lieu}</div>
                <div class="${cssClass}">${u.tag}</div>
                <div class="desc">${u.desc}</div>
            `;

            L.marker([u.lat, u.lng], {icon: icons[u.type]})
             .bindPopup(popupContent)
             .addTo(map);
        });
    </script>
</body>
</html>
